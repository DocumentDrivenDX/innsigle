<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Innsigle cartouche seal">
  <title>Innsigle cartouche</title>
  <!-- Pottery cartouche: square field stamped in a round matrix -->
  <circle cx="32" cy="32" r="31.5" fill="#141210"/>
  <circle cx="32" cy="32" r="29.5" fill="none" stroke="#e4dccf" stroke-width="1.75"/>
  <!-- Inner cartouche plate -->
  <rect x="14" y="14" width="36" height="36" rx="3" fill="#e4dccf"/>
  <rect x="17" y="17" width="30" height="30" rx="1.5" fill="none" stroke="#141210" stroke-width="1.4"/>
  <g fill="none" stroke="#141210" stroke-width="2.4" stroke-linecap="square" stroke-linejoin="miter">
    <path d="M32 20 V44"/>
    <path d="M24 27 L32 20 L40 27"/>
    <path d="M25 33 H39"/>
    <path d="M27 39 H37"/>
    <path d="M32 29 L35.5 33 L32 37 L28.5 33 Z" stroke-width="2"/>
  </g>
</svg>
