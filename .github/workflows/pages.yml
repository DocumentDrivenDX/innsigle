name: Deploy microsite

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Test CLI and golden vectors
        run: npm test

      - name: Sync dogfood and marks into site
        run: |
          set -euo pipefail
          mkdir -p site/assets/marks site/dogfood/.well-known/innsigle/claims
          cp docs/dogfood/assets/marks/*.svg site/assets/marks/
          cp docs/dogfood/.well-known/innsigle/keys.json site/dogfood/.well-known/innsigle/
          cp docs/dogfood/.well-known/innsigle/claims/*.json site/dogfood/.well-known/innsigle/claims/
          cp docs/dogfood/index.html site/dogfood/index.html
          sed -i 's|src="assets/marks/|src="../assets/marks/|g' site/dogfood/index.html
          touch site/.nojekyll
          test -f site/index.html
          test -f site/assets/css/site.css

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          force_orphan: true
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
