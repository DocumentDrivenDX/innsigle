name: Deploy microsite

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Test CLI and golden vectors
        run: npm test

      - name: Sync dogfood into site
        run: |
          set -euo pipefail
          mkdir -p site/assets/marks site/dogfood/.well-known/innsigle/claims
          cp docs/dogfood/assets/marks/*.svg site/assets/marks/
          cp docs/dogfood/.well-known/innsigle/keys.json site/dogfood/.well-known/innsigle/
          cp docs/dogfood/.well-known/innsigle/claims/*.json site/dogfood/.well-known/innsigle/claims/
          cp docs/dogfood/index.html site/dogfood/index.html
          sed -i 's|src="assets/marks/|src="../assets/marks/|g' site/dogfood/index.html
          # Prefer site-relative mark path when already rewritten
          sed -i 's|src="../assets/marks/|src="../assets/marks/|g' site/dogfood/index.html
          test -f site/index.html
          test -f site/assets/css/site.css

      # Primary: classic gh-pages branch (works without Actions Pages environment approval)
      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          force_orphan: true
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com

      # Also publish via Actions artifact when org runners + Pages env allow it
      - name: Upload Pages artifact
        if: success()
        continue-on-error: true
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy-pages:
    needs: build-and-deploy
    if: success()
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    continue-on-error: true
    steps:
      - name: Deploy to GitHub Pages (workflow)
        id: deployment
        uses: actions/deploy-pages@v4
